# Конфиг nabor. Скопируй в config.toml и правь; приложение файл только
# читает (никогда не перезаписывает). Все ключи опциональны — ниже дефолты.
# Диалог настроек в UI пишет свои значения в settings.json — они
# перекрывают config.toml.

# library_dir = "./library"
# lines_before = 2      # строк набранного текста над курсорной строкой
# lines_after = 2       # строк будущего текста под курсорной строкой
# error_tail_max = 4    # хвост ошибок; 0 = ни шагу с ошибкой
# idle_timeout = 5.0    # стоп таймера скорости после стольких секунд простоя
# cursor = "line"       # "line" (подчёркивание) или "block"
# skip_epigraphs = false  # true — не печатать эпиграфы fb2. В HPMOR эпиграф —
#                         # шутка автора («#include "стандартныйотказотправ.h"»),
#                         # так что по умолчанию печатаем.

# Obsidian-хранилище: «Случайная заметка» в меню (Ctrl+N, `nabor --note`).
# Заметка — разовое упражнение: прогресс не пишется, на полку не попадает.
# Пустой vault_dir (дефолт) — режим выключен, пункт меню не показывается.
# vault_dir = "~/Documents/My vault"
# vault_exclude = ["Templates", "Dashboards"]  # верхние папки/файлы вне пула
# note_min_chars = 300  # заметки короче — не упражнение, тянем следующую
# markdown = "rendered" # "rendered" — разметка снята (печатаешь то, что видишь
#                       # в Obsidian); "raw" — печатается исходник с ** и [[ ]].
#                       # Всегда выкидываются: frontmatter, эмодзи, картинки.

# Издательские врезки — рекламные абзацы, вшитые в файл при выкладке
# («Мы рады представить вам электронную версию…», ссылки на литрес).
# Список regex; задан в конфиге — заменяет встроенный ЦЕЛИКОМ. Абзац
# выкидывается, если regex нашёлся в нём (без учёта регистра). Глава,
# от которой ничего не осталось, пропадает целиком.
# skip_paragraphs = [
#   "^Мы рады представить вам электронную версию",
#   "^Опубликовано на .*https?://",
#   "купив полную легальную версию",
# ]

# Таблица нормализации: символ книги → что показываем и печатаем.
# Задана в конфиге — заменяет встроенную ЦЕЛИКОМ (не мержится).
# [normalize]
# "—" = "-"
# "«" = '"'
# "»" = '"'
# "…" = "..."
# "ё" = "е"
# "Ё" = "Е"
