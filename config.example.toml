# Конфиг nabor. Скопируй в config.toml и правь; приложение файл только
# читает (никогда не перезаписывает). Все ключи опциональны — ниже дефолты.

# library_dir = "./library"
# window_lines = 5      # строк текста на экране
# error_tail_max = 4    # длина красного хвоста ошибок
# idle_timeout = 5.0    # секунд простоя до автопаузы (WPM по активному времени)
# cursor = "line"       # "line" (подчёркивание) или "block"

# Таблица нормализации: символ книги → что показываем и печатаем.
# Задана в конфиге — заменяет встроенную ЦЕЛИКОМ (не мержится).
# [normalize]
# "—" = "-"
# "«" = '"'
# "»" = '"'
# "…" = "..."
# "ё" = "е"
# "Ё" = "Е"
